[runtime]
mode = "local"
dataDir = "~/.synapse/runtime"
logLevel = "info"

[server]
host = "0.0.0.0"
port = 3000
publicBaseUrl = "${PUBLIC_BASE_URL:-http://127.0.0.1:3000}"

[admin]
enabled = true
host = "127.0.0.1"
port = 3766
token = "${SYNAPSE_ADMIN_TOKEN:-}"
allowedOrigins = ["http://127.0.0.1:3766", "http://localhost:3766"]
allowedRemoteAddresses = ["127.0.0.1", "::1", "::ffff:127.0.0.1"]
logBufferSize = 300

[context]
enabled = true
maxHistoryChars = 6000
timezone = "Asia/Shanghai"
privateHistoryTtlMinutes = 720
groupHistoryTtlMinutes = 30
channelHistoryTtlMinutes = 30
privateMaxMessages = 20
groupMaxMessages = 6
channelMaxMessages = 8

[agent]
default = "qwen"
systemPrompt = "You are Synapse Runtime, a concise assistant in QQ conversations."

[agent.providers.qwen]
type = "qwen"
apiKey = "${QWEN_API_KEY}"
baseUrl = "${QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}"
model = "qwen-plus"
temperature = 0.3

